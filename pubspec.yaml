name: routematch
description: RouteMatch - Smart delivery route optimizer for Uber Eats, Rappi & DiDi Food
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── MAPAS GRATUITOS (OpenStreetMap, sin API key) ──────────────────────────
  flutter_map: ^6.1.0              # Mapa OSM con tiles gratuitos
  latlong2: ^0.9.0                 # Coordenadas LatLng
  flutter_map_cancellable_tile_provider: ^2.0.0  # Tiles optimizados

  # ── LOCALIZACIÓN EN TIEMPO REAL ───────────────────────────────────────────
  geolocator: ^11.0.0              # GPS streaming en tiempo real
  permission_handler: ^11.3.1      # Permisos de ubicación

  # ── RUTAS GRATUITAS (OSRM — Open Source Routing Machine) ─────────────────
  http: ^1.2.1                     # Para llamar OSRM API (gratis, sin key)

  # ── ALMACENAMIENTO ────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── UI / ESTADO ───────────────────────────────────────────────────────────
  provider: ^6.1.2
  flutter_local_notifications: ^17.2.2

  # ── UTILS ─────────────────────────────────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
